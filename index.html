<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Keto Tracker</title>
<meta name="description" content="A fast, no-nonsense personal keto diet tracker. Log meals, energy, mood, and ketone tests with minimal friction.">
<meta name="theme-color" content="#060d18" id="meta-theme-color">

<!-- PWA manifest -->
<link rel="manifest" href="./manifest.json">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Keto Tracker">
<link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="./icons/icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="./icons/icon-120.png">

<!-- Favicon -->
<link rel="icon" sizes="192x192" href="./icons/icon-192.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥑</text></svg>">

<!-- Capacitor bridge — injected automatically by the native WebView.
     The onerror suppresses the 404 when running as a plain browser PWA. -->
<script src="capacitor.js" onerror="void 0"></script>
<style>
:root{--bg:#060d18;--bd:rgba(255,255,255,.07);--bd-i:rgba(255,255,255,.1);--txt:#e2e8f0;--txt-m:#94a3b8;--txt-d:#475569;--surf:rgba(255,255,255,.055);--surf2:rgba(255,255,255,.08);--inp:rgba(255,255,255,.05);--accent:#5cb85c;--gold:#f5c842;--red:#e05252;--blue:#5b9cf6}
[data-theme="obsidian"]{--bg:#000;--surf:rgba(255,255,255,.04);--surf2:rgba(255,255,255,.07)}
[data-theme="graphite"]{--bg:#18191a;--surf:rgba(255,255,255,.06);--surf2:rgba(255,255,255,.09)}
[data-theme="navy"]    {--bg:#020817;--surf:rgba(255,255,255,.05);--surf2:rgba(255,255,255,.08)}
[data-theme="twilight"]{--bg:#0d0618;--surf:rgba(255,255,255,.05);--surf2:rgba(255,255,255,.08)}
[data-theme="aurora"]  {--bg:#011a1a;--surf:rgba(255,255,255,.05);--surf2:rgba(255,255,255,.08)}
[data-theme="forest"]  {--bg:#011a08;--surf:rgba(255,255,255,.05);--surf2:rgba(255,255,255,.08)}
[data-theme="ember"]   {--bg:#150803;--surf:rgba(255,255,255,.05);--surf2:rgba(255,255,255,.08)}
[data-theme="pearl"]   {--bg:#f5f5f7;--bd:rgba(0,0,0,.09);--bd-i:rgba(0,0,0,.15);--txt:#1d1d1f;--txt-m:#6e6e73;--txt-d:#86868b;--surf:rgba(255,255,255,.82);--surf2:rgba(0,0,0,.04);--inp:rgba(0,0,0,.05)}
[data-theme="azure"]   {--bg:#eff6ff;--bd:rgba(0,0,0,.09);--bd-i:rgba(0,0,0,.15);--txt:#1d1d1f;--txt-m:#6e6e73;--txt-d:#86868b;--surf:rgba(255,255,255,.82);--surf2:rgba(0,0,0,.04);--inp:rgba(0,0,0,.05)}
[data-theme="blossom"] {--bg:#fff0f5;--bd:rgba(0,0,0,.09);--bd-i:rgba(0,0,0,.15);--txt:#1d1d1f;--txt-m:#6e6e73;--txt-d:#86868b;--surf:rgba(255,255,255,.82);--surf2:rgba(0,0,0,.04);--inp:rgba(0,0,0,.05)}
[data-theme="meadow"]  {--bg:#f0fdf4;--bd:rgba(0,0,0,.09);--bd-i:rgba(0,0,0,.15);--txt:#1d1d1f;--txt-m:#6e6e73;--txt-d:#86868b;--surf:rgba(255,255,255,.82);--surf2:rgba(0,0,0,.04);--inp:rgba(0,0,0,.05)}
[data-theme="lavender"]{--bg:#f5f3ff;--bd:rgba(0,0,0,.09);--bd-i:rgba(0,0,0,.15);--txt:#1d1d1f;--txt-m:#6e6e73;--txt-d:#86868b;--surf:rgba(255,255,255,.82);--surf2:rgba(0,0,0,.04);--inp:rgba(0,0,0,.05)}
[data-theme="sunset"]  {--bg:#fff7ed;--bd:rgba(0,0,0,.09);--bd-i:rgba(0,0,0,.15);--txt:#1d1d1f;--txt-m:#6e6e73;--txt-d:#86868b;--surf:rgba(255,255,255,.82);--surf2:rgba(0,0,0,.04);--inp:rgba(0,0,0,.05)}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column;height:100dvh;transition:background .3s,color .3s}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--bd);flex-shrink:0;order:3;background:var(--bg)}
.hdr-title{font-size:.95rem;font-weight:700;color:var(--gold)}
.hdr-nav{display:flex;align-items:center;gap:6px}
.hdr-date{font-size:.78rem;color:var(--txt);min-width:68px;text-align:center;background:var(--surf2);border:1px solid var(--bd);border-radius:9px;padding:5px 12px;cursor:pointer;font-family:inherit;transition:.15s}
.hdr-date:active{transform:scale(.95)}
.ico-btn{background:var(--surf2);border:1px solid var(--bd);color:var(--txt);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.ico-btn:disabled{opacity:.3;cursor:default}
.ico-btn:not(:disabled):active{transform:scale(.93)}

.main{flex:1;overflow-y:auto;padding:20px 18px 12px;display:flex;flex-direction:column;order:1}
.main::-webkit-scrollbar{display:none}

.dots{display:flex;gap:5px;justify-content:center;margin-bottom:22px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--bd-i);transition:.3s}
.dot.done{background:var(--gold)}
.dot.active{background:var(--accent);width:22px;border-radius:4px}

.card{background:var(--surf);border:1px solid var(--bd);border-radius:20px;padding:24px 20px;display:flex;flex-direction:column;gap:18px;backdrop-filter:blur(8px)}
.step-lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:2px;color:var(--txt-m)}
.step-title{font-size:1.9rem;font-weight:800;line-height:1.1;color:var(--gold)}
.step-sub{font-size:.9rem;color:var(--txt-m);margin-top:4px}

textarea{background:var(--inp);border:1.5px solid var(--bd);border-radius:13px;color:var(--txt);font-size:1.05rem;padding:14px;resize:none;width:100%;font-family:inherit;line-height:1.5;transition:.2s}
textarea:focus{outline:none;border-color:var(--accent)}
textarea::placeholder{color:var(--txt-d)}

.r-grid{display:flex;gap:8px}
.r-btn{flex:1;height:72px;border-radius:14px;border:2px solid var(--bd);background:var(--inp);color:var(--txt);font-size:1.5rem;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:.2s;font-family:inherit}
.r-btn .rlbl{font-size:.6rem;font-weight:500;color:var(--txt-m);text-transform:uppercase;letter-spacing:.8px}
.r-btn.sel{border-color:var(--accent);background:rgba(92,184,92,.12);color:var(--accent)}
.r-btn.sel .rlbl{color:var(--accent)}
.r-btn:active{transform:scale(.94)}

.tog-list{display:flex;flex-direction:column;gap:12px}
.tog{display:flex;align-items:center;justify-content:space-between;background:var(--inp);border:2px solid var(--bd);border-radius:14px;padding:16px 18px;cursor:pointer;transition:.2s;gap:12px}
.tog.on-red{border-color:var(--red);background:rgba(224,82,82,.09)}
.tog.on-grn{border-color:var(--accent);background:rgba(92,184,92,.09)}
.tog-info{flex:1}.tog-name{font-size:1.05rem;font-weight:600}
.tog-desc{font-size:.78rem;color:var(--txt-m);margin-top:2px}
.sw{width:50px;height:27px;border-radius:14px;background:var(--bd-i);position:relative;transition:.3s;flex-shrink:0}
.sw::after{content:'';position:absolute;width:21px;height:21px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.3s}
.tog.on-red .sw{background:var(--red)}.tog.on-grn .sw{background:var(--accent)}
.tog.on-red .sw::after,.tog.on-grn .sw::after{left:26px}

.actions{display:flex;gap:10px;margin-top:4px}
.btn{border-radius:13px;border:none;font-size:1.05rem;font-weight:700;padding:17px 20px;cursor:pointer;transition:.15s;font-family:inherit}
.btn:active{transform:scale(.96)}
.btn-main{background:var(--accent);color:#fff;flex:1}
.btn-back{background:var(--surf2);color:var(--txt-m);border:1px solid var(--bd);padding:17px 18px}
.btn-skip{background:transparent;color:var(--txt-m);border:1px solid var(--bd);flex:1;font-size:.95rem;font-weight:500}
.btn-keto{background:rgba(245,200,66,.15);color:var(--gold);border:1px solid var(--gold);flex:1;font-size:.95rem;font-weight:600}

.sum-rows{display:flex;flex-direction:column;gap:10px}
.sum-row{display:flex;align-items:flex-start;gap:11px;background:var(--inp);border-radius:12px;padding:13px 14px}
.sum-ic{font-size:1.2rem;flex-shrink:0;margin-top:1px}
.sum-body{flex:1;min-width:0}
.sum-key{font-size:.68rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--txt-m);margin-bottom:3px}
.sum-val{font-size:.95rem;word-break:break-word;color:var(--txt)}
.sum-val.empty{color:var(--txt-m);font-style:italic}
.sum-edit{background:var(--surf2);border:1px solid var(--bd);color:var(--txt-m);border-radius:7px;padding:5px 9px;font-size:.75rem;cursor:pointer;flex-shrink:0;font-family:inherit}
.sum-edit:active{transform:scale(.93)}
.badges{display:flex;gap:7px;flex-wrap:wrap}
.badge{padding:4px 11px;border-radius:20px;font-size:.82rem;font-weight:600}
.b-red{background:rgba(224,82,82,.18);color:var(--red)}
.b-grn{background:rgba(92,184,92,.18);color:var(--accent)}
.done-banner{text-align:center;padding:10px 14px;background:rgba(92,184,92,.1);border-radius:10px;font-size:.88rem;color:var(--accent);font-weight:600}
.edit-all-btn{background:var(--surf2);border:1px solid var(--bd);color:var(--txt-m);border-radius:11px;padding:13px;font-size:.9rem;cursor:pointer;width:100%;font-family:inherit;font-weight:500;margin-top:2px}

#calBackdrop{display:none;position:fixed;inset:0;z-index:89;background:rgba(0,0,0,.45)}
#calBackdrop.open{display:block}
#calPanel{display:none;position:fixed;bottom:62px;left:12px;right:12px;background:var(--bg);border:1px solid var(--bd-i);border-radius:20px;z-index:90;padding:16px 14px;box-shadow:0 -8px 40px rgba(0,0,0,.65)}
#calPanel.open{display:block}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-month-lbl{font-size:1rem;font-weight:700;color:var(--gold)}
.cal-nav{background:var(--surf2);border:1px solid var(--bd);color:var(--txt);width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:.15s}
.cal-nav:active{transform:scale(.9)}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-dow{text-align:center;font-size:.6rem;font-weight:700;color:var(--txt-d);padding:2px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:.8rem;cursor:pointer;color:var(--txt-m);transition:.12s;-webkit-tap-highlight-color:transparent}
.cal-day:active:not(.future):not(.other-month){transform:scale(.85)}
.cal-day.has-data{background:var(--gold);color:#000;font-weight:600}
.cal-day.keto-meals{background:var(--accent);color:#fff;font-weight:600}
.cal-day.keto-tested{background:var(--blue);color:#fff;font-weight:600}
.cal-day.is-today{box-shadow:0 0 0 2px var(--gold)}
.cal-day.is-viewing{box-shadow:0 0 0 2.5px #fff}
.cal-day.is-today:not(.has-data):not(.keto-meals):not(.keto-tested){color:var(--gold);font-weight:700}
.cal-day.future{opacity:.2;pointer-events:none}
.cal-day.other-month{opacity:.28;cursor:pointer}
.cal-day.other-month.future{pointer-events:none}
.cal-footer{text-align:center;margin-top:10px}
.cal-today-btn{background:none;border:1px solid var(--bd);color:var(--txt-m);border-radius:8px;padding:5px 16px;font-size:.78rem;cursor:pointer;font-family:inherit;transition:.15s}
.cal-today-btn:active{background:var(--surf2)}
.cal-month-lbl{cursor:pointer;user-select:none;display:flex;align-items:center;gap:5px}
.cal-month-lbl:active{opacity:.75}
#calPicker{display:none;position:absolute;inset:0;background:var(--bg);border-radius:20px;z-index:5;flex-direction:column;padding:14px 14px 12px;box-sizing:border-box}
#calPicker.open{display:flex}
.cpkr-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cpkr-close{background:none;border:none;color:var(--txt-m);font-size:1.1rem;cursor:pointer;padding:4px 8px;font-family:inherit;line-height:1;border-radius:6px}
.cpkr-close:active{background:var(--surf2)}
.cpkr-label{font-size:1rem;font-weight:700;color:var(--gold);flex:1;text-align:center;pointer-events:none}
.cpkr-go{background:var(--accent);border:none;color:#fff;border-radius:8px;padding:5px 14px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.cpkr-go:active{opacity:.8}
.cpkr-wheels{display:flex;gap:0;height:200px}
.cpkr-col{flex:1;display:flex;flex-direction:column;align-items:center}
.cpkr-col-lbl{font-size:.6rem;font-weight:700;color:var(--txt-d);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em;flex-shrink:0}
.cpkr-wrap{position:relative;width:100%;flex:1;overflow:hidden}
.cpkr-wheel{position:absolute;inset:0;overflow-y:scroll;scroll-snap-type:y mandatory;overscroll-behavior:contain;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cpkr-wheel::-webkit-scrollbar{display:none}
.cpkr-pad{height:80px}
.cpkr-item{height:40px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--txt);scroll-snap-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cpkr-item.no-data{color:var(--txt-d);opacity:.38}
.cpkr-band{position:absolute;top:50%;transform:translateY(-50%);left:4px;right:4px;height:40px;background:var(--surf2);border-radius:8px;pointer-events:none;z-index:1}
.cpkr-fade{position:absolute;inset:0;background:linear-gradient(to bottom,var(--bg) 0%,transparent 30%,transparent 70%,var(--bg) 100%);pointer-events:none;z-index:2}
.cpkr-divider{width:1px;background:var(--bd);margin:0 4px;flex-shrink:0;align-self:stretch}
.cpkr-footer{text-align:center;margin-top:14px}
.cpkr-today{background:none;border:1px solid var(--bd);color:var(--txt-m);border-radius:8px;padding:5px 20px;font-size:.78rem;cursor:pointer;font-family:inherit;transition:.15s}
.cpkr-today:active{background:var(--surf2)}
.auto-tog{grid-column:span 2;background:var(--surf2);border:2px solid var(--bd);border-radius:10px;cursor:pointer;padding:7px 4px;text-align:center;font-size:9.5px;font-weight:700;color:var(--txt-m);transition:.15s;line-height:1.4}
.auto-tog:active{transform:scale(.97)}.auto-tog.active{border-color:var(--accent);color:var(--accent);background:rgba(92,184,92,.1)}
.tswatch.auto-dark-sel{border-color:#7dd3fc!important;box-shadow:0 0 0 1px rgba(125,211,252,.4)!important}
.tswatch.auto-light-sel{border-color:#fde68a!important;box-shadow:0 0 0 1px rgba(253,230,138,.4)!important}

.fs-modal{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;flex-direction:column;overflow-x:hidden}
.fs-modal.open{display:flex}
.fs-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bd);flex-shrink:0}
.fs-title{font-size:1rem;font-weight:700;color:var(--gold)}
.fs-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 18px;display:flex;flex-direction:column;gap:14px}
.fs-body::-webkit-scrollbar{display:none}

.ov-card{background:var(--surf);border:1px solid var(--bd);border-radius:16px;padding:16px;cursor:pointer;transition:.15s;position:relative;user-select:none}
.ov-card:active{transform:scale(.98)}
.ov-card.selected{border-color:var(--accent);background:rgba(92,184,92,.1)}
.ov-chk{display:none;position:absolute;top:10px;right:10px;background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;pointer-events:none}
.ov-card.selected .ov-chk{display:flex}
.sel-del-btn{background:var(--red);color:#fff;border:none;border-radius:10px;padding:6px 14px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit}
.ov-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.ov-date{font-size:.95rem;font-weight:700;color:var(--gold);min-width:0}
.ov-meals{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.ov-meal{font-size:.82rem;color:var(--txt-m)}
.ov-meal span{color:var(--txt);word-break:break-word}
.ov-stats{display:flex;gap:8px;flex-wrap:wrap}
.ov-stat{background:var(--inp);border-radius:8px;padding:5px 10px;font-size:.78rem;display:flex;align-items:center;gap:5px}
.ov-stat .sv{font-weight:700;color:var(--txt)}
.ov-stat .sk{color:var(--txt-m)}
.ov-empty{text-align:center;color:var(--txt-m);padding:48px 0;font-size:.95rem}

/* SETTINGS */
.set-section{display:flex;flex-direction:column;gap:10px}
.set-label{font-size:.68rem;text-transform:uppercase;letter-spacing:1.8px;color:var(--txt-m);font-weight:700;padding:0 2px}
.set-banner-grn{background:rgba(92,184,92,.1);border:1px solid rgba(92,184,92,.25);color:var(--accent);border-radius:13px;padding:13px 16px;font-size:.88rem;font-weight:600}
.set-row{display:flex;gap:10px}
.set-inp{flex:1;background:var(--inp);border:1.5px solid var(--bd);border-radius:11px;color:var(--txt);font-size:.95rem;padding:12px 14px;font-family:inherit;outline:none;transition:.2s}
.set-inp:focus{border-color:var(--accent)}
.set-inp::placeholder{color:var(--txt-d)}
.set-btn{border-radius:11px;border:none;font-weight:700;padding:12px 18px;cursor:pointer;font-family:inherit;font-size:.9rem;transition:.15s;white-space:nowrap}
.set-btn:active{transform:scale(.95)}
.set-btn-save{background:var(--accent);color:#fff}
.set-btn-neutral{background:var(--surf2);border:1px solid var(--bd);color:var(--txt);flex:1}
.set-btn-neutral.active{background:var(--accent);border-color:var(--accent);color:#fff}
.upd-pill{background:var(--surf2);border:1px solid var(--bd);color:var(--txt-m);border-radius:20px;padding:3px 9px 3px 9px;font-size:.7rem;cursor:pointer;font-family:inherit;transition:.2s;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;vertical-align:middle;margin-left:5px;line-height:1.4}
.upd-pill:not(:disabled):active{opacity:.7}
.upd-pill:disabled{cursor:default}
.upd-pill.upd-ready{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700;animation:updPulse 2s ease-in-out infinite}
.upd-pill.upd-ok{border-color:var(--accent);color:var(--accent)}
@keyframes updPulse{0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,.45)}55%{box-shadow:0 0 0 5px rgba(212,175,55,0)}}
@keyframes updSpin{to{transform:rotate(360deg)}}
.upd-spin{display:inline-block;animation:updSpin .75s linear infinite}
.storage-box{background:var(--inp);border:1px solid var(--bd);border-radius:13px;padding:14px 16px;display:flex;flex-direction:column;gap:6px}
.storage-bar-wrap{background:var(--surf2);border-radius:6px;height:7px;overflow:hidden}
.storage-bar{height:100%;border-radius:6px;background:var(--accent);transition:.4s}
.storage-bar.warn{background:var(--gold)}
.storage-bar.full{background:var(--red)}
.snap-list{display:flex;flex-direction:column;gap:9px}
.snap-card{background:var(--surf);border:1px solid var(--bd);border-radius:13px;padding:13px 14px;display:flex;align-items:center;gap:10px}
.snap-info{flex:1;min-width:0}
.snap-name{font-size:.92rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.snap-meta{font-size:.75rem;color:var(--txt-m);margin-top:2px}
.snap-acts{display:flex;gap:6px;flex-shrink:0}
.snap-act{border-radius:8px;border:none;font-size:.75rem;font-weight:700;padding:6px 10px;cursor:pointer;font-family:inherit;transition:.15s}
.snap-act:active{transform:scale(.93)}
.sa-restore{background:rgba(91,156,246,.15);color:var(--blue);border:1px solid rgba(91,156,246,.25)}

<script>
// ── CAPACITOR DETECTION ───────────────────────────────────────────────────────
// CAP is true only inside a Capacitor native WebView (Android / iOS).
// FS / Dir are null on plain web — localStorage / IndexedDB paths stay active.
const CAP = typeof Capacitor !== 'undefined' && Capacitor.isNativePlatform();
const FS  = CAP ? Capacitor.Plugins.Filesystem : null;
const Dir = 'DATA'; // FilesystemDirectory.Data → getFilesDir() on Android

// ── STORAGE MODULE ────────────────────────────────────────────────────────────
const Storage = (() => {
  const P  = 'kt_';           // pref/general prefix
  const PD = 'kt_d_';         // day entry prefix
  const PS = 'kt__snapshots'; // snapshot key

  // ── prefs: always localStorage (tiny; needed synchronously for theme init) ──
  const prefs = {
    get(key)      { return localStorage.getItem(P+key); },
    set(key, val) { localStorage.setItem(P+key, val); }
  };

  // ── day: localStorage on web, Filesystem JSON files on native ──────────────
  const day = {
    async get(k) {
      if (!CAP) { const r=localStorage.getItem(PD+k); return r?JSON.parse(r):null; }
      try {
        const {data}=await FS.readFile({path:`days/${k}.json`,directory:Dir,encoding:'utf8'});
        return JSON.parse(data);
      } catch(_) { return null; }
    },
    async set(k,v) {
      if (!CAP) { localStorage.setItem(PD+k,JSON.stringify(v)); return; }
      await FS.writeFile({path:`days/${k}.json`,directory:Dir,data:JSON.stringify(v),encoding:'utf8'});
    },
    async delete(k) {
      if (!CAP) { localStorage.removeItem(PD+k); return; }
      try { await FS.deleteFile({path:`days/${k}.json`,directory:Dir}); } catch(_) {}
    },
    async allKeys() {
      if (!CAP) {
        const a=[];
        for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(PD))a.push(k.slice(PD.length));}
        return a.sort();
      }
      try {
        const {files}=await FS.readdir({path:'days',directory:Dir});
        return files
          .map(f=>(typeof f==='string'?f:f.name).replace('.json',''))
          .filter(n=>/^\d{4}-\d{2}-\d{2}$/.test(n))
          .sort();
      } catch(_) { return []; }
    }
  };

  // ── snaps: localStorage on web, snapshots.json on native ───────────────────
  const snaps = {
    async get() {
      if (!CAP) { const r=localStorage.getItem(PS); return r?JSON.parse(r):[]; }
      try {
        const {data}=await FS.readFile({path:'snapshots.json',directory:Dir,encoding:'utf8'});
        return JSON.parse(data);
      } catch(_) { return []; }
    },
    async set(arr) {
      if (!CAP) { localStorage.setItem(PS,JSON.stringify(arr)); return; }
      await FS.writeFile({path:'snapshots.json',directory:Dir,data:JSON.stringify(arr),encoding:'utf8'});
    }
  };

  // ── photos: IndexedDB on web, Filesystem JPEG files on native ──────────────
  const _PH_DB='keto-photos', _PH_ST='photos';
  let _db=null;
  function _openDB(){
    if(_db)return Promise.resolve(_db);
    return new Promise((res,rej)=>{
      const r=indexedDB.open(_PH_DB,1);
      r.onupgradeneeded=e=>e.target.result.createObjectStore(_PH_ST);
      r.onsuccess=e=>{_db=e.target.result;res(_db);};
      r.onerror=rej;
    });
  }
  function _phk(date,meal,idx){return idx==null?date+'_'+meal:date+'_'+meal+'_'+idx;}
  function _phPath(date,meal,idx){return idx==null?`photos/${date}_${meal}.jpg`:`photos/${date}_${meal}_${idx}.jpg`;}
  function _blobToB64(blob){
    return new Promise((res,rej)=>{
      const fr=new FileReader();
      fr.onload=()=>res(fr.result.split(',')[1]);
      fr.onerror=rej;
      fr.readAsDataURL(blob);
    });
  }
  function _b64ToBlob(b64,mime='image/jpeg'){
    const bin=atob(b64),arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
    return new Blob([arr],{type:mime});
  }

  const photos = {
    async save(date,meal,blob) {
      if (!CAP) return _openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(_PH_ST,'readwrite');tx.objectStore(_PH_ST).put(blob,_phk(date,meal));tx.oncomplete=res;tx.onerror=rej;}));
      await FS.writeFile({path:_phPath(date,meal,null),directory:Dir,data:await _blobToB64(blob)});
    },
    async get(date,meal) {
      if (!CAP) return _openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(_PH_ST,'readonly');const r=tx.objectStore(_PH_ST).get(_phk(date,meal));r.onsuccess=e=>res(e.target.result||null);r.onerror=rej;}));
      try { const {data}=await FS.readFile({path:_phPath(date,meal,null),directory:Dir}); return _b64ToBlob(data); } catch(_) { return null; }
    },
    async delete(date,meal) {
      if (!CAP) return _openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(_PH_ST,'readwrite');tx.objectStore(_PH_ST).delete(_phk(date,meal));tx.oncomplete=res;tx.onerror=rej;}));
      try { await FS.deleteFile({path:_phPath(date,meal,null),directory:Dir}); } catch(_) {}
    },
    async saveAt(date,meal,idx,blob) {
      if (!CAP) return _openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(_PH_ST,'readwrite');tx.objectStore(_PH_ST).put(blob,_phk(date,meal,idx));tx.oncomplete=res;tx.onerror=rej;}));
      await FS.writeFile({path:_phPath(date,meal,idx),directory:Dir,data:await _blobToB64(blob)});
    },
    async getAt(date,meal,idx) {
      if (!CAP) return _openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(_PH_ST,'readonly');const r=tx.objectStore(_PH_ST).get(_phk(date,meal,idx));r.onsuccess=e=>res(e.target.result||null);r.onerror=rej;}));
      try { const {data}=await FS.readFile({path:_phPath(date,meal,idx),directory:Dir}); return _b64ToBlob(data); } catch(_) { return null; }
    },
    async deleteAt(date,meal,idx) {
      if (!CAP) return _openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(_PH_ST,'readwrite');tx.objectStore(_PH_ST).delete(_phk(date,meal,idx));tx.oncomplete=res;tx.onerror=rej;}));
      try { await FS.deleteFile({path:_phPath(date,meal,idx),directory:Dir}); } catch(_) {}
    }
  };

  // ── stats ───────────────────────────────────────────────────────────────────
  async function stats(){
    if (!CAP) {
      // Original localStorage + IndexedDB path (unchanged for web PWA)
      let textBytes=0;
      try {
        for(let i=0;i<localStorage.length;i++){
          const k=localStorage.key(i);
          if(k&&k.startsWith(P))textBytes+=(k.length+(localStorage.getItem(k)||'').length)*2;
        }
      } catch(e) { console.error('Could not calculate text storage:',e); }
      const textKB=Math.round(textBytes/1024);
      let photoBytes=0,photoCount=0;
      try{
        const db=await _openDB();
        await new Promise((resolve,reject)=>{
          const tx=db.transaction(_PH_ST,'readonly');
          const store=tx.objectStore(_PH_ST);
          const req=store.openCursor();
          req.onsuccess=e=>{const cur=e.target.result;if(!cur){resolve();return;}if(cur.value){photoBytes+=cur.value.size||0;photoCount++;}cur.continue();};
          req.onerror=e=>{console.error('DB cursor error:',e.target.error);reject(e.target.error);};
        });
      } catch(e) { console.error('Could not calculate photo storage:',e); }
      const photoKB=Math.round(photoBytes/1024);
      let quotaKB=5120;
      try{ const est=await navigator.storage.estimate(); if(est.quota)quotaKB=Math.round(est.quota/1024); } catch(e) {}
      const totalKB=textKB+photoKB;
      const pct=Math.min(100,Math.round((totalKB/Math.max(1,quotaKB))*100));
      return{textKB,photoKB,photoCount,totalKB,quotaKB,pct};
    }

    // Capacitor path: stat each file in days/ and photos/
    let textBytes=0,photoBytes=0,photoCount=0;
    try {
      const {files}=await FS.readdir({path:'days',directory:Dir});
      for(const f of files){
        try{const s=await FS.stat({path:`days/${typeof f==='string'?f:f.name}`,directory:Dir});textBytes+=s.size||0;}catch(_){}
      }
    } catch(_) {}
    for(const file of ['snapshots.json']){
      try{const s=await FS.stat({path:file,directory:Dir});textBytes+=s.size||0;}catch(_){}
    }
    try {
      const {files}=await FS.readdir({path:'photos',directory:Dir});
      for(const f of files){
        try{const s=await FS.stat({path:`photos/${typeof f==='string'?f:f.name}`,directory:Dir});photoBytes+=s.size||0;photoCount++;}catch(_){}
      }
    } catch(_) {}
    const totalKB=Math.round((textBytes+photoBytes)/1024);
    // Directory.Data is effectively quota-free; use 512 MB as a display ceiling
    const quotaKB=524288;
    const pct=Math.min(100,Math.round((totalKB/quotaKB)*100));
    return{textKB:Math.round(textBytes/1024),photoKB:Math.round(photoBytes/1024),photoCount,totalKB,quotaKB,pct};
  }

  return{day,snaps,prefs,photos,stats};
})();

// ── CAPACITOR FILESYSTEM INIT & FIRST-RUN MIGRATION ──────────────────────────
async function initFilesystem() {
  if (!CAP) return;
  // Ensure required directories and base files exist
  for (const dir of ['days','photos']) {
    try { await FS.mkdir({path:dir,directory:Dir,recursive:true}); } catch(_) {}
  }
  try { await FS.stat({path:'snapshots.json',directory:Dir}); }
  catch(_) { await FS.writeFile({path:'snapshots.json',directory:Dir,data:'[]',encoding:'utf8'}); }
  await _runMigrationIfNeeded();
}

// Migrates any existing localStorage / IndexedDB data to Filesystem on first run.
// Idempotent: protected by the 'migrated_v1' pref flag written last.
async function _runMigrationIfNeeded() {
  if (Storage.prefs.get('migrated_v1') === 'true') return;
  const PD='kt_d_', PS='kt__snapshots';

  // 1. Day entries
  const dayKeys=[];
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(PD))dayKeys.push(k.slice(PD.length));}
  let migrated=0;
  for(const k of dayKeys){
    const raw=localStorage.getItem(PD+k);
    if(raw){
      try{await FS.writeFile({path:`days/${k}.json`,directory:Dir,data:raw,encoding:'utf8'});migrated++;}
      catch(e){console.error('Migration: failed to write day '+k,e);}
    }
  }

  // 2. Snapshots
  const snapsRaw=localStorage.getItem(PS);
  try{await FS.writeFile({path:'snapshots.json',directory:Dir,data:snapsRaw||'[]',encoding:'utf8'});}
  catch(e){console.error('Migration: failed to write snapshots',e);}

  // 3. Photos from IndexedDB
  await _migratePhotosFromIDB();

  // 4. Mark complete (written last so a crashed migration re-runs cleanly)
  Storage.prefs.set('migrated_v1','true');
  if(migrated>0){toast(`Migrated ${migrated} day${migrated!==1?'s':''} to native storage ✓`);}
}

// Cursors over every entry in IndexedDB keto-photos and writes it as a
// Filesystem JPEG file.  Non-fatal: errors are logged, not thrown.
async function _migratePhotosFromIDB() {
  try{
    const db=await new Promise((res,rej)=>{
      const r=indexedDB.open('keto-photos',1);
      r.onupgradeneeded=e=>e.target.result.createObjectStore('photos');
      r.onsuccess=e=>res(e.target.result);
      r.onerror=rej;
    });
    const entries=await new Promise((res,rej)=>{
      const tx=db.transaction('photos','readonly');
      const req=tx.objectStore('photos').openCursor();
      const out=[];
      req.onsuccess=e=>{const cur=e.target.result;if(!cur){res(out);return;}out.push({key:cur.primaryKey,blob:cur.value});cur.continue();};
      req.onerror=rej;
    });
    for(const {key,blob} of entries){
      try{
        const b64=await new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result.split(',')[1]);fr.onerror=rej;fr.readAsDataURL(blob);});
        await FS.writeFile({path:`photos/${key}.jpg`,directory:Dir,data:b64});
      }catch(e){console.error('Migration: failed to write photo '+key,e);}
    }
  }catch(e){console.warn('Photo migration skipped (no prior IndexedDB data or error):',e);}
}

// ── THEME ────────────────────────────────────────────────────────────────────
const THEMES=[
  {id:'midnight',name:'Midnight',emoji:'🌑',dark:true, bg:'#060d18',bar:'#0a1628'},
  {id:'obsidian',name:'Obsidian',emoji:'⬛',dark:true, bg:'#000',   bar:'#111'},
  {id:'graphite',name:'Graphite',emoji:'🪨',dark:true, bg:'#18191a',bar:'#2c2d2e'},
  {id:'navy',    name:'Navy',    emoji:'⚓',dark:true, bg:'#020817',bar:'#0d1b3e'},
  {id:'twilight',name:'Twilight',emoji:'🌆',dark:true, bg:'#0d0618',bar:'#2d1052'},
  {id:'aurora',  name:'Aurora',  emoji:'🌌',dark:true, bg:'#011a1a',bar:'#063a3a'},
  {id:'forest',  name:'Forest',  emoji:'🌲',dark:true, bg:'#011a08',bar:'#063a14'},
  {id:'ember',   name:'Ember',   emoji:'🔥',dark:true, bg:'#150803',bar:'#3d1505'},
  {id:'pearl',   name:'Pearl',   emoji:'🤍',dark:false,bg:'#f5f5f7',bar:'#fff'},
  {id:'azure',   name:'Azure',   emoji:'💙',dark:false,bg:'#eff6ff',bar:'#bfdbfe'},
  {id:'blossom', name:'Blossom', emoji:'🌸',dark:false,bg:'#fff0f5',bar:'#fbcfe8'},
  {id:'meadow',  name:'Meadow',  emoji:'🌿',dark:false,bg:'#f0fdf4',bar:'#bbf7d0'},
  {id:'lavender',name:'Lavender',emoji:'💜',dark:false,bg:'#f5f3ff',bar:'#ddd6fe'},
  {id:'sunset',  name:'Sunset',  emoji:'🌅',dark:false,bg:'#fff7ed',bar:'#fed7aa'},
];
let curTheme='midnight',_prev=null,_rt=null,_autoMode=false;
function applyTheme(id,perm=true){
  if(perm&&!_autoMode){curTheme=id;Storage.prefs.set('theme',id);}
  document.documentElement.setAttribute('data-theme',id);
  document.querySelectorAll('.tswatch').forEach(el=>el.classList.toggle('active',el.dataset.tid===id));
}
function applyAutoTheme(){
  const isDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
  const id=isDark?(Storage.prefs.get('theme_dark_auto')||'midnight'):(Storage.prefs.get('theme_light_auto')||'pearl');
  curTheme=id;document.documentElement.setAttribute('data-theme',id);
  document.querySelectorAll('.tswatch').forEach(el=>el.classList.toggle('active',el.dataset.tid===id));
}
function toggleAutoTheme(){
  _autoMode=!_autoMode;
  Storage.prefs.set('theme_auto',_autoMode?'on':'off');
  if(_autoMode){
    if(!Storage.prefs.get('theme_dark_auto'))Storage.prefs.set('theme_dark_auto',THEMES.find(t=>t.dark).id);
    if(!Storage.prefs.get('theme_light_auto'))Storage.prefs.set('theme_light_auto',THEMES.find(t=>!t.dark).id);
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',applyAutoTheme);
    applyAutoTheme();
  }else{
    window.matchMedia('(prefers-color-scheme: dark)').removeEventListener('change',applyAutoTheme);

// exportToDownloads: writes to the public Downloads folder on Android via
// Capacitor Filesystem; falls back to a web anchor download on plain browser.
async function exportToDownloads(obj,fname){
  if(!CAP){dlJSON(obj,fname);return;}
  try{
    // Check / request WRITE_EXTERNAL_STORAGE (required only on Android ≤ 9)
    const perm=await FS.checkPermissions().catch(()=>({publicStorage:'granted'}));
    if(perm.publicStorage!=='granted'){
      const req=await FS.requestPermissions().catch(()=>({publicStorage:'denied'}));
      if(req.publicStorage!=='granted'){
        toast('Storage permission denied — file not saved',true);
        return;
      }
    }
    await FS.writeFile({path:fname,directory:'DOWNLOADS',data:JSON.stringify(obj,null,2),encoding:'utf8'});
    toast('Saved to Downloads ✓');
  }catch(e){
    console.error('exportToDownloads failed:',e);
    // Fall back to web-style download (triggers share sheet on some Android configs)
    dlJSON(obj,fname);
  }
}
function dlJSON(obj,fname){
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify(obj,null,2));
  a.download=fname;a.click();
}
// Merge imported entry into existing entry field by field.
// Imported value only fills a field if the existing value is empty (null, '', false).
function mergeEntries(existing,imported){
  const merged={...existing};
  for(const field of Object.keys(imported)){
    const ex=existing[field],imp=imported[field];
    const empty=ex===null||ex===''||ex===false||ex===undefined;
    if(empty&&imp!==null&&imp!==''&&imp!==undefined)merged[field]=imp;
  }
  return merged;
}

function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=async ev=>{
    try{
      const raw=JSON.parse(ev.target.result);
      if(typeof raw!=='object'||Array.isArray(raw))throw 0;
      // Validate and normalise all entries from the file
      const valid={};
      for(const[k,v]of Object.entries(raw)){
        const dk=k.startsWith('kt_d_')?k.slice(5):k.startsWith('kt_')?k.slice(3):k;
        if(/^\d{4}-\d{2}-\d{2}$/.test(dk)&&typeof v==='object')valid[dk]=v;
      }
      if(!Object.keys(valid).length){toast('No valid entries found in file',true);e.target.value='';return;}
      // Split into new entries and duplicates
      const existingSet=new Set(await allKeys());
      const newKeys=Object.keys(valid).filter(k=>!existingSet.has(k));
      const dupKeys=Object.keys(valid).filter(k=>existingSet.has(k));
      // First confirm — show counts
      const summary=`${newKeys.length} new day${newKeys.length!==1?'s':''} to add`+(dupKeys.length?` · ${dupKeys.length} duplicate${dupKeys.length!==1?'s':''} found`:'');
      if(!confirm(`Merge import into your existing data?\n\n${summary}`)){e.target.value='';return;}
      // Duplicate handling — three modes via two dialogs
      let dupMode='skip'; // 'merge' | 'overwrite' | 'skip'
      if(dupKeys.length){
        const wantMerge=confirm(`${dupKeys.length} day${dupKeys.length!==1?'s':''}  already exist in your data.\n\nOK → Merge (fill empty fields only — existing values kept)\nCancel → choose overwrite or skip`);
        if(wantMerge){dupMode='merge';}
        else{
          const wantOverwrite=confirm(`Overwrite the ${dupKeys.length} duplicate day${dupKeys.length!==1?'s':''} entirely?\n\nOK → Overwrite (imported replaces existing)\nCancel → Skip (keep existing, ignore imported)`);
          dupMode=wantOverwrite?'overwrite':'skip';
        }
      }
      // Write new entries
      await Promise.all(newKeys.map(dk=>lsSetDay(dk,valid[dk])));
      // Handle duplicates per chosen mode
      if(dupMode==='merge'){
        const existing=await Promise.all(dupKeys.map(dk=>load(dk)));
        await Promise.all(dupKeys.map((dk,i)=>lsSetDay(dk,mergeEntries(existing[i],valid[dk]))));
      }else if(dupMode==='overwrite'){
        await Promise.all(dupKeys.map(dk=>lsSetDay(dk,valid[dk])));
      }
      vk=todayKey();ent=await load(vk);si=defStep(ent);render();
      const dupCount=dupMode!=='skip'?dupKeys.length:0;
      const written=newKeys.length+dupCount;
      const modeLabel=dupKeys.length?(dupMode==='merge'?' (merged)':dupMode==='overwrite'?' (overwritten)':` · ${dupKeys.length} duplicate${dupKeys.length!==1?'s':''} skipped`):'';
      toast(`Imported ${written} day${written!==1?'s':''}${modeLabel} ✓`);
      closeSettings();
    }catch{toast('Invalid file — import failed',true);}
    e.target.value='';
  };
  r.readAsText(file);
}

  lunch:    {ic:'🥗',lbl:'Meal 2 of 3',   title:'Lunch',     sub:'What did you have for lunch?',      type:'txt'},
  dinner:   {ic:'🍽️',lbl:'Meal 3 of 3', title:'Dinner',    sub:'What did you eat for dinner?',      type:'txt'},

  happiness:{ic:'😊',lbl:'Daily Check-in',title:'Happiness', sub:'How happy did you feel today?',     type:'rate'},
  portion:  {ic:'🍽',lbl:'Daily Check-in',title:'Portions',  sub:'How were your portion sizes?',      type:'rate'},

const PH={breakfast:'2 eggs, bacon, avocado',lunch:'Grilled chicken salad',dinner:'Steak with broccoli',notes:'Had cravings at 3pm...'};

const todayKey=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const fmtDate=k=>{const d=new Date(k+'T12:00:00');return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]+', '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getDate();};
const offKey=(k,n)=>{const dt=new Date(k+'T12:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);};
const smartStep=()=>{const h=new Date().getHours();if(h<10)return'breakfast';if(h<14)return'lunch';if(h<20)return'dinner';return'energy';};

let vk=todayKey(),si=0,ent={};

function defStep(e){
  if(vk!==todayKey())return STEPS.indexOf('summary');
  const inc=STEPS.filter(s=>!['flags','notes','summary'].includes(s)).filter(s=>{
    if(['breakfast','lunch','dinner'].includes(s))return!e[s];
    return e[s]===null;
  });
  if(!inc.length)return STEPS.indexOf('summary');
  const ss=smartStep();
  if(inc.includes(ss))return STEPS.indexOf(ss);
  const ssi=STEPS.indexOf(ss);
  for(let i=0;i<=ssi;i++)if(inc.includes(STEPS[i]))return i;
  return STEPS.indexOf(inc[0]);
}

async function init(){await initFilesystem();vk=todayKey();ent=await load(vk);si=defStep(ent);render();}

function renderSum(isT,canEdit=isT){
  const e=ent;
  const rows=[
    {ic:'🍳',k:'Breakfast',v:e.breakfast||null,si:0,meal:'breakfast',ketoKey:'breakfastKeto'},
    {ic:'🥗',k:'Lunch',    v:e.lunch||null,    si:1,meal:'lunch',    ketoKey:'lunchKeto'},

    {ic:'⚡',k:'Energy',   v:e.energy   ?`${e.energy}/5 — ${RLBL[e.energy]}`    :null,si:3},
    {ic:'😊',k:'Happiness',v:e.happiness?`${e.happiness}/5 — ${RLBL[e.happiness]}`:null,si:4},
    {ic:'🍽',k:'Portions', v:e.portion  ?`${e.portion}/5 — ${PLBL[e.portion]}`  :null,si:5},
    {ic:'📝',k:'Notes',    v:e.notes||null,si:7},
  ];
  const badges=[];

// ── UPDATE CHECKER ────────────────────────────────────────────────────────────
async function checkForUpdate(){
  if(_updState==='checking'||_updState==='ready')return;
  setUpdatePill('checking');
  if(!_swReg){setUpdatePill('uptodate');return;}
  // Track whether updatefound fired so we know if a download is in progress
  let found=false;
  const onFound=()=>{found=true;};
  _swReg.addEventListener('updatefound',onFound,{once:true});
  try{
    await _swReg.update();
  }catch(e){
    _swReg.removeEventListener('updatefound',onFound);
    if(_updState==='checking')setUpdatePill('idle');
    return;
  }
  _swReg.removeEventListener('updatefound',onFound);
  if(found){
    // New SW is installing; controllerchange will fire and set pill to 'ready'.
    // Guard against a stall (e.g. network drop mid-download) — reset after 10 s.
    setTimeout(()=>{if(_updState==='checking')setUpdatePill('idle');},10000);
  }else if(_updState==='checking'){
    setUpdatePill('uptodate');
  }
}

function setUpdatePill(state){
  _updState=state;
  const p=document.getElementById('updPill');
  if(!p)return;
  if(state==='idle'){
    p.innerHTML=`v${APP_VERSION}&nbsp;<span>↻</span>`;
    p.className='upd-pill';p.disabled=false;
  }else if(state==='checking'){
    p.innerHTML=`v${APP_VERSION}&nbsp;<span class="upd-spin">↻</span>`;
    p.className='upd-pill';p.disabled=true;
  }else if(state==='uptodate'){
    p.innerHTML=`v${APP_VERSION}&nbsp;<span>✓</span>`;
    p.className='upd-pill upd-ok';p.disabled=false;
    setTimeout(()=>setUpdatePill('idle'),3000);
  }else if(state==='ready'){
    p.innerHTML=`v${APP_VERSION}&nbsp;· Restart&nbsp;→`;
    p.className='upd-pill upd-ready';p.disabled=false;
  }
}

function handleUpdPill(){
  if(_updState==='ready')location.reload();
  else checkForUpdate();
}

// Service worker registration — keep reference for manual update checks
let _swReg = null;
let _updState = 'idle'; // idle | checking | uptodate | ready
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        _swReg = reg;
        // Fires when a new SW activates and takes control mid-session
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          _updState = 'ready';
          setUpdatePill('ready');
        });
      })
      .catch(() => {});
  });
}

// ── PHOTO STORAGE (shims → Storage module) ────────────────────────────────────
function savePhotoBlob(date, meal, blob) { return Storage.photos.save(date, meal, blob); }
function getPhotoBlob(date, meal)        { return Storage.photos.get(date, meal); }
function deletePhotoBlob(date, meal)     { return Storage.photos.delete(date, meal); }

const MAX_MEAL_PHOTOS = 5;

// Returns [{idx, blob}] for all photos on a meal.
// idx===null means the legacy key (date_meal); idx===0,1,… means indexed slots.
async function getMealPhotos(date, meal) {
  const out = [];
  const leg = await Storage.photos.get(date, meal);
  if (leg) out.push({idx: null, blob: leg});
  for (let i = 0; i < MAX_MEAL_PHOTOS; i++) {
    const b = await Storage.photos.getAt(date, meal, i);
    if (b) out.push({idx: i, blob: b});
  }
  return out;
}

// Save a new photo at the next free indexed slot.
// Migrates any existing legacy-key photo to index 0 on first multi-photo save.
async function addMealPhoto(date, meal, blob) {
  const existing = await getMealPhotos(date, meal);
  if (existing.length >= MAX_MEAL_PHOTOS) { toast(`Max ${MAX_MEAL_PHOTOS} photos per meal`, true); return false; }
  const usedIdx = new Set(existing.map(p => p.idx).filter(i => i !== null));
  const legEntry = existing.find(p => p.idx === null);
  if (legEntry && !usedIdx.has(0)) {
    await Storage.photos.saveAt(date, meal, 0, legEntry.blob);
    await Storage.photos.delete(date, meal);
    usedIdx.add(0);
  }
  let nextIdx = 0;
  while (usedIdx.has(nextIdx)) nextIdx++;
  await Storage.photos.saveAt(date, meal, nextIdx, blob);
  return true;
}

// Delete all photos for a meal (legacy + every indexed slot).
async function deleteAllMealPhotos(date, meal) {
  await Storage.photos.delete(date, meal);
  for (let i = 0; i < MAX_MEAL_PHOTOS; i++) await Storage.photos.deleteAt(date, meal, i);
}

// ── IMAGE COMPRESSION ─────────────────────────────────────────────────────────
function compressImage(file) {
  const savedQuality = Storage.prefs.get('quality') || 'medium';
  let maxPx, quality;

  switch (savedQuality) {
    case 'high':
      maxPx = 1200;
      quality = 0.8;
      break;
    case 'low':
      maxPx = 600;
      quality = 0.5;
      break;
    case 'medium':
    default:
      maxPx = 900;
      quality = 0.7;
      break;
  }

  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let {width, height} = img;
      if (width > maxPx || height > maxPx) {
        if (width >= height) { height = Math.round(height * maxPx / width); width = maxPx; }
        else { width = Math.round(width * maxPx / height); height = maxPx; }
      }
      const c = document.createElement('canvas');
      c.width = width; c.height = height;
      c.getContext('2d').drawImage(img, 0, 0, width, height);
      c.toBlob(resolve, 'image/jpeg', quality);
    };
    img.src = url;
  });
}

const CAL_MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
let _calYear, _calMonth;

async function calPrev(){if(--_calMonth<0){_calMonth=11;_calYear--;}await buildCal();}
async function calNext(){
  const now=new Date();
  if(_calYear>now.getFullYear()||(_calYear===now.getFullYear()&&_calMonth>=now.getMonth()))return;
  if(++_calMonth>11){_calMonth=0;_calYear++;}await buildCal();
}

async function buildCal(){
  const today=todayKey();
  const dataSet=new Set(await allKeys());
  const testedKetoSet=new Set();
  const ketoMealsSet=new Set();
  const first=new Date(_calYear,_calMonth,1);
  const last=new Date(_calYear,_calMonth+1,0);
  // Collect keys for this month that have data, then bulk-load
  const monthKeys=[];
  for(let d=new Date(first);d<=last;d.setDate(d.getDate()+1)){const k=d.toISOString().slice(0,10);if(dataSet.has(k))monthKeys.push(k);}
  const monthEntries=await Promise.all(monthKeys.map(k=>load(k)));
  const entryMap=Object.fromEntries(monthKeys.map((k,i)=>[k,monthEntries[i]]));
  for(const k of monthKeys){
    const entry=entryMap[k];
    if(entry.tested&&!entry.notInKeto)testedKetoSet.add(k);
    else if((entry.breakfastKeto?1:0)+(entry.lunchKeto?1:0)+(entry.dinnerKeto?1:0)>=2)ketoMealsSet.add(k);
  }
  document.getElementById('calTitle').innerHTML=CAL_MONTHS[_calMonth]+' '+_calYear+'<span style="font-size:.7em;opacity:.55;margin-left:3px">▾</span>';
  const startDow=first.getDay();
  const daysInMonth=last.getDate();
  const TOTAL=42;
  let cells='';

  // Leading days from previous month
  let prevYear=_calYear,prevMonth=_calMonth-1;
  if(prevMonth<0){prevMonth=11;prevYear--;}
  const prevLast=new Date(prevYear,prevMonth+1,0).getDate();
  for(let i=startDow-1;i>=0;i--){
    const day=prevLast-i;
    const k=`${prevYear}-${String(prevMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isFut=k>today;
    cells+=`<div class="cal-day other-month${isFut?' future':''}"${!isFut?` onclick="calNavMonth(${prevYear},${prevMonth})"`:''} title="${k}">${day}</div>`;
  }

  // Current month days
  for(let day=1;day<=daysInMonth;day++){
    const k=`${_calYear}-${String(_calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const cls=['cal-day'];
    if(k>today){cls.push('future');}
    else{
      if(testedKetoSet.has(k))cls.push('keto-tested');
      else if(ketoMealsSet.has(k))cls.push('keto-meals');
      else if(dataSet.has(k))cls.push('has-data');
      if(k===today)cls.push('is-today');
      if(k===vk)cls.push('is-viewing');
    }
    const isFuture=cls.includes('future');
    cells+=`<div class="${cls.join(' ')}"${!isFuture?` onclick="calSelect('${k}')"`:''} title="${k}">${day}</div>`;
  }

  // Trailing days from next month (always fill to 42 cells)
  let nextYear=_calYear,nextMonth=_calMonth+1;
  if(nextMonth>11){nextMonth=0;nextYear++;}
  const trailing=TOTAL-(startDow+daysInMonth);
  for(let day=1;day<=trailing;day++){
    const k=`${nextYear}-${String(nextMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isFut=k>today;
    cells+=`<div class="cal-day other-month${isFut?' future':''}"${!isFut?` onclick="calNavMonth(${nextYear},${nextMonth})"`:''} title="${k}">${day}</div>`;
  }

  document.getElementById('calGrid').innerHTML=cells;
  document.getElementById('calFooter').innerHTML='';
}

async function calNavMonth(year,month){_calYear=year;_calMonth=month;await buildCal();}

function calSelect(k){jumpTo(k);closeCal();}

// ── CALENDAR MONTH/YEAR PICKER ────────────────────────────────────────────────
const CPKR_IH=40; // item height in px — must match .cpkr-item height
const CPKR_PAD=80; // top/bottom padding — must be 2 * CPKR_IH
let _cpkrM=0,_cpkrY=0; // picker's in-progress selection
let _cpkrTimers={},_cpkrBusy=false; // busy flag prevents scroll→snap→scroll loops

async function openCalPicker(){
  const yearsWithData=new Set((await allKeys()).map(k=>parseInt(k.slice(0,4))));
  const now=new Date();
  const curY=now.getFullYear();
  const minY=yearsWithData.size?Math.min(...yearsWithData):curY-5;
  const maxY=curY+5;

  // Month wheel HTML
  let mHTML='<div class="cpkr-pad"></div>';
  CAL_MONTHS.forEach((m,i)=>{mHTML+=`<div class="cpkr-item" data-val="${i}" onclick="cpkrTap(this,'month')">${m}</div>`;});
  mHTML+='<div class="cpkr-pad"></div>';

  // Year wheel HTML
  let yHTML='<div class="cpkr-pad"></div>';
  const years=[];
  for(let y=minY;y<=maxY;y++){
    yHTML+=`<div class="cpkr-item${yearsWithData.has(y)?'':' no-data'}" data-val="${y}" onclick="cpkrTap(this,'year')">${y}</div>`;
    years.push(y);
  }
  yHTML+='<div class="cpkr-pad"></div>';

  const mw=document.getElementById('cpkrMonth');
  const yw=document.getElementById('cpkrYear');
  mw.innerHTML=mHTML;
  yw.innerHTML=yHTML;

  // Seed picker state from current calendar view
  _cpkrM=_calMonth;
  _cpkrY=_calYear;
  updateCpkrLabel();

  // scrollTop must be set AFTER the browser has laid out the new HTML.
  // Two rAF frames guarantee a full layout pass has occurred.
  const mTarget=_calMonth*CPKR_IH;
  const yTarget=Math.max(0,years.indexOf(_calYear))*CPKR_IH;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    _cpkrBusy=true;
    mw.scrollTop=mTarget;
    yw.scrollTop=yTarget;
    // Release busy flag after scroll settles
    setTimeout(()=>{_cpkrBusy=false;},80);
  }));

  document.getElementById('calPicker').classList.add('open');
}

function closeCalPicker(){
  document.getElementById('calPicker').classList.remove('open');
}

// Called when user taps directly on a wheel item
function cpkrTap(el,type){
  const val=parseInt(el.dataset.val);
  const wheel=el.closest('.cpkr-wheel');
  const items=[...wheel.querySelectorAll('.cpkr-item')];
  const idx=items.indexOf(el);
  _cpkrBusy=true;
  wheel.scrollTo({top:idx*CPKR_IH,behavior:'smooth'});
  setTimeout(()=>{_cpkrBusy=false;},350);
  if(type==='month')_cpkrM=val; else _cpkrY=val;
  updateCpkrLabel();
}

function onCpkrScroll(el,type){
  if(_cpkrBusy)return;
  clearTimeout(_cpkrTimers[type]);
  _cpkrTimers[type]=setTimeout(()=>{
    // Snap to the nearest item
    const rawIdx=el.scrollTop/CPKR_IH;
    const idx=Math.round(rawIdx);
    const items=el.querySelectorAll('.cpkr-item');
    if(!items[idx])return;
    const val=parseInt(items[idx].dataset.val);
    if(type==='month')_cpkrM=val; else _cpkrY=val;
    updateCpkrLabel();
    // Force exact snap position if the wheel didn't land perfectly
    const exactTop=idx*CPKR_IH;
    if(Math.abs(el.scrollTop-exactTop)>0.5){
      _cpkrBusy=true;
      el.scrollTo({top:exactTop,behavior:'smooth'});
      setTimeout(()=>{_cpkrBusy=false;},350);
    }
  },250);
}

function updateCpkrLabel(){
  document.getElementById('cpkrLabel').textContent=CAL_MONTHS[_cpkrM]+' '+_cpkrY;
}

async function applyCalPicker(){
  _calMonth=_cpkrM;
  _calYear=_cpkrY;
  closeCalPicker();
  await buildCal();
}

async function pickerGoToday(){
  const n=new Date();
  _calYear=n.getFullYear();_calMonth=n.getMonth();
  closeCalPicker();
  await buildCal();
}

// ── ALL DAYS: LONG-PRESS MULTI-SELECT & DELETE ────────────────────────────────
let _selMode=false,_selKeys=new Set(),_lpTimer=null;

function lpStart(e,k){
  _lpTimer=setTimeout(()=>{
    _lpTimer=null;
    if(navigator.vibrate)navigator.vibrate(50);
    enterSelMode(k);
  },500);
}
function lpEnd(){if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null;}}
function lpMove(){if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null;}}

function onCardClick(k){
  if(_selMode){toggleCardSel(k);}
  else{jumpTo(k);closeOverview();}
}

function enterSelMode(k){
  _selMode=true;
  _selKeys=new Set([k]);
  updateOvHeader();
  updateCardVisuals();
}

function exitSelMode(){
  _selMode=false;
  _selKeys.clear();
  updateOvHeader();
  updateCardVisuals();
}

function toggleCardSel(k){
  if(_selKeys.has(k))_selKeys.delete(k);else _selKeys.add(k);
  if(_selKeys.size===0){exitSelMode();return;}
  updateOvHeader();
  updateCardVisuals();
}

function updateOvHeader(){
  const hdr=document.getElementById('ovHdr');
  if(!hdr)return;
  if(_selMode){
    hdr.innerHTML=`<div class="fs-title" style="color:var(--txt)">${_selKeys.size} selected</div><div style="display:flex;gap:8px;align-items:center"><button class="sel-del-btn" onclick="deleteSelected()">🗑️ Delete</button><button class="ico-btn" onclick="exitSelMode()">✕</button></div>`;
  }else{
    hdr.innerHTML=`<div class="fs-title">📋 All Days</div><button class="ico-btn" onclick="closeOverview()">✕</button>`;
  }
}

function updateCardVisuals(){
  document.querySelectorAll('.ov-card').forEach(card=>{
    const k=card.dataset.key;
    card.classList.toggle('selected',_selMode&&_selKeys.has(k));
  });
}

async function deleteSelected(){
  if(!_selKeys.size)return;
  const n=_selKeys.size;
  if(!confirm(`Delete ${n} day${n>1?'s':''}? This cannot be undone.`))return;
  for(const k of _selKeys){
    await Storage.day.delete(k);
    for(const meal of ['breakfast','lunch','dinner'])await deleteAllMealPhotos(k,meal);
    if(vk===k){vk=todayKey();ent=await load(vk);}
  }
  exitSelMode();
  await openOverview();
}
</script>
